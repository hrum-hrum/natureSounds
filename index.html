<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Nature Sounds</title>
</head>

<body>
    <div id="app">
        <h1>Weather Sounds</h1>
        <div class="btn__block">
            <button id="summerBtn" class="sound__btn btn btn_summer" data-sound="summer"><img
                    src="./files/assets/icons/sun.svg"></button>
            <button id="rainyBtn" class="sound__btn btn btn_rainy" data-sound="rain"><img
                    src="./files/assets/icons/cloud-rain.svg"></button>
            <button id="snowyBtn" class="sound__btn btn btn_snowy" data-sound="winter"><img
                    src="./files/assets/icons/cloud-snow.svg"></button>
        </div>
        <audio controls>
            <source type="audio/mp3">
            Your browser does not support the audio element.
        </audio>
        <!-- <div class="progress">
            <progress id="progress" value="30" max="100">
                <span id="progress-bar"></span>
            </progress>
        </div> -->
    </div>
    <script src="./app.js" type="module"></script>
</body>

</html>
